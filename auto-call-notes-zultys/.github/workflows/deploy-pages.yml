name: Deploy GitHub Pages Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: auto-call-notes-zultys/package.json
      - name: Install deps
        working-directory: auto-call-notes-zultys
        run: npm install
      - name: Build web demo
        working-directory: auto-call-notes-zultys
        env:
          VITE_PUBLIC_BASE: /${{ github.event.repository.name }}/
        run: npm run web:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: auto-call-notes-zultys/dist-web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
